name: Publish packages to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      package:
        description: 'Which package to publish.'
        required: true
        default: 'openclaw-skill'
        type: choice
        options:
          - openclaw-skill
          - codex-plugin
      tag:
        description: 'Git tag to publish (e.g. v0.8.2). Must match the selected package version.'
        required: true

jobs:
  publish-openclaw:
    name: npm publish @cly-org/switchbot-openclaw-skill
    if: github.event_name == 'release' || inputs.package == 'openclaw-skill'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # for npm provenance
    steps:
      - name: Checkout (release tag)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Setup Node 20 + npm registry
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package.json version
        working-directory: packages/openclaw-skill
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          TAG_VER="${TAG#v}"
          PKG_VER=$(node -p "require('./package.json').version")
          echo "tag=$TAG_VER  package.json=$PKG_VER"
          if [ "$TAG_VER" != "$PKG_VER" ]; then
            echo "::error::Tag ($TAG_VER) does not match packages/openclaw-skill/package.json version ($PKG_VER)."
            exit 1
          fi

      - name: Install (npm ci)
        working-directory: packages/openclaw-skill
        run: npm ci

      - name: Test
        working-directory: packages/openclaw-skill
        run: npm test

      - name: Publish (public, with provenance)
        working-directory: packages/openclaw-skill
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-codex:
    name: npm publish @cly-org/switchbot-codex-plugin
    if: github.event_name == 'workflow_dispatch' && inputs.package == 'codex-plugin'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout (release tag)
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Node 20 + npm registry
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package.json version
        working-directory: packages/codex-plugin
        run: |
          TAG="${{ inputs.tag }}"
          TAG_VER="${TAG#v}"
          PKG_VER=$(node -p "require('./package.json').version")
          echo "tag=$TAG_VER  package.json=$PKG_VER"
          if [ "$TAG_VER" != "$PKG_VER" ]; then
            echo "::error::Tag ($TAG_VER) does not match packages/codex-plugin/package.json version ($PKG_VER)."
            exit 1
          fi

      - name: Install (npm ci)
        working-directory: packages/codex-plugin
        run: npm ci

      - name: Test
        working-directory: packages/codex-plugin
        run: npm test

      - name: Pack smoke test
        working-directory: packages/codex-plugin
        run: npm pack --dry-run

      - name: Publish (public, with provenance)
        working-directory: packages/codex-plugin
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
